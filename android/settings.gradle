pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withReader("UTF-8") { reader -> properties.load(reader) }
        def sdkDir = properties.getProperty("flutter.sdk")
        assert sdkDir != null, "flutter.sdk not set in local.properties"
        return sdkDir
    }

    includeBuild("${flutterSdkPath()}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
}

include ":app"

// Set a custom NDK directory if needed
// ext.ndkDirectory = "$rootDir/../../android-ndk"

def flutterProjectRoot = rootProject.projectDir.parentFile.toPath()

def plugins = new Properties()
def pluginsFile = new File(flutterProjectRoot.toFile(), '.flutter-plugins')
if (pluginsFile.exists()) {
    pluginsFile.withReader('UTF-8') { reader -> plugins.load(reader) }
}

plugins.each { name, path ->
    def pluginDirectory = flutterProjectRoot.resolve(path).resolve('android').toFile()
    include ":$name"
    project(":$name").projectDir = pluginDirectory
}

// When using the legacy plugin integration and also downloading plugins from
// repositories (i.e. using `flutter_migrate`), we also need to include
// downloaded plugin dependencies.
def repos = new Properties()
def reposFile = new File(flutterProjectRoot.toFile(), '.flutter-plugins-dependencies')
if (reposFile.exists()) {
    reposFile.withReader('UTF-8') { reader -> repos.load(reader) }
}
